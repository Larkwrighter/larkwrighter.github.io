---
layout: default
---
<div class="post">

  <header class="post-header">
    <h1 class="blog-header">{{ page.title }}</h1>
    <p class="blog-meta">{{ page.date | date: "%B %-d, %Y" }} || Post Category: {{ page.category }}{% if page.author %} • {{ page.author }}{% endif %}{% if page.meta %} • {{ page.meta }}{% endif %}</p>
  </header>
    <hr style="height:10px;padding-top:10px;"></hr>
  <article class="post-content">
    {{ content }}
  </article>
        <hr style="height:10px;padding-top:0px;"></hr>
<p class="blog-meta" style="padding-top: 0px"><a href=/blog>⤺ Return to Post List</a></p>
</div>
